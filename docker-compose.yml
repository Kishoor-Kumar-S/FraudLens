version: '3.8'

services:

  postgres:
    image: postgres:14
    container_name: fraudlens_postgres
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_pass
      POSTGRES_DB: fraudlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "fraud_user"]
      interval: 10s
      retries: 5

  streamlit:
    image: python:3.9-slim
    container_name: fraudlens_dashboard
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install -r requirements.txt && streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
